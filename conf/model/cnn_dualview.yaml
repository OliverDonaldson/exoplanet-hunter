# Dual-view 1D CNN — Shallue & Vanderburg 2018 architecture.
# Builds via the Keras Functional API (matches DATA 305 Week 5 notes).
name: cnn_dualview
type: keras

use_aux_features: false    # Set true when stellar params are joined into the model.
use_batchnorm: true
spatial_dropout: 0.05
l2: 5.0e-5

global_view:
  conv_blocks: [16, 32, 64]            # Reduced from [16,32,64,128,256]
  conv_per_block: 2
  kernel_size: 5
  pool_size: 5                          # Larger pool → faster downsampling

local_view:
  conv_blocks: [16, 32]
  conv_per_block: 2
  kernel_size: 5
  pool_size: 3

head:
  fc_units: [256, 128]                  # More capacity than [128,64]
  dropout: 0.4

output:
  activation: sigmoid
  units: 1
