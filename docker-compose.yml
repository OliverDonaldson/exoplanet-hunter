# Two services that share the project directory and an MLflow tracking store.
# Use:
#   docker compose up         # both services
#   docker compose up mlflow  # tracking server only
#
# Once up:
#   - MLflow:   http://localhost:5000
#   - Jupyter:  http://localhost:8888

services:
  mlflow:
    build: .
    container_name: exohunter-mlflow
    command: >
      mlflow server
      --backend-store-uri sqlite:////workspace/mlruns/mlflow.db
      --default-artifact-root /workspace/mlruns
      --host 0.0.0.0
      --port 5000
    ports:
      - "5000:5000"
    volumes:
      - .:/workspace
      - lightkurve-cache:/data/.lightkurve-cache
    environment:
      MLFLOW_TRACKING_URI: http://localhost:5000

  jupyter:
    build: .
    container_name: exohunter-jupyter
    depends_on:
      - mlflow
    ports:
      - "8888:8888"
      - "8050:8050"     # Plotly Dash dashboard
    volumes:
      - .:/workspace
      - lightkurve-cache:/data/.lightkurve-cache
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000

volumes:
  lightkurve-cache:
