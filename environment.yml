name: exoplanet-hunter
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip>=24
  - pip:
      # --- Astronomy ---
      - lightkurve>=2.5
      - astropy>=6.1
      - astroquery>=0.4.7
      - transitleastsquares>=1.0.31

      # --- Core scientific stack ---
      - numpy>=1.26,<2.1
      - scipy>=1.13
      - pandas>=2.2
      - pyarrow>=16
      - matplotlib>=3.9
      - plotly>=5.22
      - dash>=2.17

      # --- Classical ML ---
      - scikit-learn>=1.5
      - shap>=0.46
      - joblib>=1.4

      # --- Deep learning (Apple Silicon: tensorflow + tensorflow-metal) ---
      - tensorflow>=2.16,<2.18
      - tensorflow-metal>=1.1; platform_system == "Darwin" and platform_machine == "arm64"

      # --- Experiment + config ---
      - mlflow>=2.14
      - hydra-core>=1.3
      - omegaconf>=2.3
      - optuna>=3.6
      - optuna-integration[mlflow,tfkeras]>=3.6

      # --- Tooling ---
      - pytest>=8
      - pytest-cov>=5
      - ruff>=0.5
      - mypy>=1.10
      - pre-commit>=3.7
      - nbstripout>=0.7
      - jupyterlab>=4.2
      - ipykernel>=6.29
      - tqdm>=4.66
      - rich>=13.7

      # --- Local install ---
      - -e .
